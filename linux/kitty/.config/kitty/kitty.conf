# Kitty terminal configuration
# Used on native Arch Linux (not WSL — use WezTerm on Windows)

# ── Font ────────────────────────────────────────────────────────────────────
font_family      CaskaydiaCove NF
font_size        10.0

# ── Cursor ──────────────────────────────────────────────────────────────────
cursor_shape     block
cursor_blink_interval 0

# ── Window ──────────────────────────────────────────────────────────────────
initial_window_width  140c
initial_window_height 48c
window_padding_width  4

# ── Theme ───────────────────────────────────────────────────────────────────
# Catppuccin Mocha — install via: kitten themes
# include ~/.config/kitty/themes/catppuccin-mocha.conf
